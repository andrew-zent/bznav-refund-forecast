name: Weekly Forecast Update

on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일 09:00 KST (UTC 00:00)
  workflow_dispatch:
    inputs:
      full_sync:
        description: "전건 재동기화 (lost_reason 등 신규 필드 backfill)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install numpy openpyxl

      - name: Extract from Pipedrive (개인)
        env:
          PIPEDRIVE_API_TOKEN: ${{ secrets.PIPEDRIVE_API_TOKEN }}
          PIPEDRIVE_DOMAIN: ${{ secrets.PIPEDRIVE_DOMAIN }}
        run: python src/extract_pipedrive.py ${{ inputs.full_sync && '--full' || '' }}

      - name: Extract from Pipedrive (법인)
        env:
          CORP_PIPEDRIVE_API_TOKEN: ${{ secrets.CORP_PIPEDRIVE_API_TOKEN }}
        run: python src/extract_corp.py ${{ inputs.full_sync && '--full' || '' }}

      - name: Run forecast model
        env:
          PIPEDRIVE_API_TOKEN: ${{ secrets.PIPEDRIVE_API_TOKEN }}
          PIPEDRIVE_DOMAIN: ${{ secrets.PIPEDRIVE_DOMAIN }}
        working-directory: src
        run: python model.py

      - name: Snapshot + timeline
        run: python src/snapshot.py

      - name: Download previous history.sqlite from release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download history-archive -p history.sqlite -D output/ || echo "No existing archive — will create fresh"

      - name: Archive raw deals to SQLite
        run: python src/archive_history.py

      - name: Upload history.sqlite to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 릴리스 없으면 생성, 있으면 asset 교체
          gh release view history-archive >/dev/null 2>&1 || \
            gh release create history-archive --title "Deal History Archive" --notes "Weekly raw deal snapshots accumulated in SQLite. Download: \`gh release download history-archive -p history.sqlite\`"
          gh release upload history-archive output/history.sqlite --clobber

      - name: Cleanup — do not commit history.sqlite
        run: rm -f output/history.sqlite

      - name: Generate dashboard
        working-directory: src
        run: python generate_dashboard.py

      - name: Send Slack notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python src/notify_slack.py

      - name: Commit updated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: weekly forecast update $(date +%Y-%m-%d)"
          git push

  deploy-pages:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (after update job pushed)
        run: git pull origin main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
