name: Daily Filing Rate Report

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 09:00 KST (UTC 00:00)
  workflow_dispatch: {}  # 수동 실행 가능

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore Pipedrive incremental cache
        uses: actions/cache@v4
        with:
          path: data/
          key: pipedrive-data-${{ github.run_id }}
          restore-keys: |
            pipedrive-data-

      - name: Extract Pipedrive (incremental, 개인만)
        env:
          PIPEDRIVE_API_TOKEN: ${{ secrets.PIPEDRIVE_API_TOKEN }}
          PIPEDRIVE_DOMAIN: ${{ secrets.PIPEDRIVE_DOMAIN }}
        run: python src/extract_pipedrive.py

      - name: Run filing rate monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python src/agents/filing_rate_monitor.py

      - name: Commit filing rate report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/filing_rate_report.json output/filing_rate_snapshots/
          git diff --staged --quiet || git commit -m "chore: daily filing rate report $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
