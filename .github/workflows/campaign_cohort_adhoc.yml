name: Campaign Cohort Ad-hoc Run

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract Pipedrive (full, 개인만)
        env:
          PIPEDRIVE_API_TOKEN: ${{ secrets.PIPEDRIVE_API_TOKEN }}
          PIPEDRIVE_DOMAIN: ${{ secrets.PIPEDRIVE_DOMAIN }}
        run: python src/extract_pipedrive.py --full

      - name: Run campaign cohort analysis
        run: python src/campaign_cohort_analysis.py

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/campaign_cohort_analysis.json
          git diff --staged --quiet || git commit -m "chore: campaign cohort ad-hoc run $(date +%Y-%m-%d)"
          git push
